title: sgb-theme
author: Stadt.Geschichte.Basel
version: 1.0.0
quarto-required: '>=1.6.0'
contributes:
  # Default format configurations
  formats:
    html:
      # Theme and appearance
      theme:
        - cosmo
        - _theme.scss
      css: styles.css
      mainfont: Euclid Circular B
      # Features
      toc: true
      link-external-icon: true
      link-external-newwindow: true
      code-copy: true
      code-overflow: wrap
      title-block-categories: false
      canonical-url: true

      # Analytics - Configure site-specific Umami Cloud tracking in
      # your project _quarto.yml via format.sgb-theme-html.include-in-header.

      # Resources
      resources:
        - assets/fonts/EuclidCircularB-Medium-WebS.woff2
        - assets/fonts/EuclidCircularB-Regular-WebS.woff2
        - assets/fonts/EuclidCircularB-Semibold-WebS.woff2
        - assets/img/logo.svg
        - favicon.png
